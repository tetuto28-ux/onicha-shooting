hard_blocks:
  - keyword: ["診断", "治る", "効く症状", "治療", "処方", "薬"]
    reason: "医療助言と誤認されるリスク"
  - keyword: ["儲かる", "必ず勝てる", "確実な投資", "元本保証", "利回り保証"]
    reason: "金融助言・誇大表現"
  - keyword: ["本名", "住所", "年収", "電話番号"]
    reason: "プライバシー・名誉毀損"
  - keyword: ["閲覧注意", "グロ", "事故映像", "遺体", "自殺"]
    reason: "センシティブコンテンツ"
  - keyword: ["アニメ考察", "漫画ネタバレ", "映画解説", "ゲーム実況"]
    reason: "著作権リスク"
  - keyword: ["絶対", "必ず", "100%", "確実に"]
    reason: "誇大表現・検証不能な断言"
  - keyword: ["声を再現", "声に似せ", "声マネ", "顔を再現"]
    reason: "実在人物の声・容姿模倣禁止"

soft_warnings:
  - keyword: ["怖い話", "都市伝説"]
    note: "事実と創作の区別を明確に表記すること"
  - keyword: ["ランキング", "最強", "最悪"]
    note: "根拠の明示と主観である旨の表記が必要"
  - keyword: ["意外と知らない", "衝撃の事実"]
    note: "検証可能な情報源を必ず確認すること"
